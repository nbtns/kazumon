# kazumonをGitHub Pagesに自動デプロイするワークフロー
# セキュリティチェック（Semgrep + Gitleaks）が両方成功した場合のみデプロイを実行
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pagesのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを防ぐため、実行中のワークフローはキャンセル
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # === セキュリティチェック1: Semgrep（静的解析） ===
  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          generateSarif: true

  # === セキュリティチェック2: Gitleaks（シークレット漏洩検知） ===
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # === ビルド ===
  build:
    name: Build
    needs: [semgrep, gitleaks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # === デプロイ ===
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4